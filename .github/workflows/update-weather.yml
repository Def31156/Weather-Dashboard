name: Update Weather Data

on:
  schedule:
    # 9:00 AM UTC = 5:00 AM Eastern (EDT)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run weather fetch script
        run: node fetch-weather.js

      - name: Commit and push updated weather.json
        run: |
          git config user.name "Weather Bot"
          git config user.email "weather-bot@users.noreply.github.com"
          git add weather.json
          git diff --staged --quiet || git commit -m "Update weather data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
